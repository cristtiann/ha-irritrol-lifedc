start_cycle:
  name: Start cycle
  description: Start a full irrigation cycle using the ESPHome bridge.
  fields:
    direction:
      name: Direction
      description: Cycle direction.
      selector:
        select:
          options:
            - forward
            - reverse
      default: forward
    repeat:
      name: Repeat
      description: Number of cycle repetitions.
      selector:
        number:
          min: 1
          max: 3
          step: 1
      default: 1

stop:
  name: Stop
  description: Stop all irrigation zones.

next_zone:
  name: Next zone
  description: Skip to the next zone.

pause:
  name: Pause
  description: Pause the active run.

resume:
  name: Resume
  description: Resume the paused run.

run_zone:
  name: Run zone
  description: Run a single zone using the current ESPHome duration settings.
  fields:
    zone:
      name: Zone
      required: true
      selector:
        number:
          min: 1
          max: 4
          step: 1
