type: vertical-stack
cards:
  - type: markdown
    title: Irrigation Controller
    content: >
      {% set status = states('sensor.irritrol_lifedc_status') %} {% set
      progress = states('sensor.irritrol_lifedc_cycle_progress') | float(0)
      | round(0) | int %} {% set remaining =
      states('sensor.irritrol_lifedc_cycle_time_remaining') | int(0) %} {%
      set min = remaining // 60 %} {% set sec = remaining % 60 %} {% set bars =
      progress // 10 %} {% set connected =
      is_state('binary_sensor.irritrol_lifedc_connected', 'on') %}

      {% if 'Running' in status %} <h2><font color="#22c55e">● {{ status
      }}</font></h2> {% elif status == 'Paused' %} <h2><font color="#f59e0b">●
      Paused</font></h2> {% elif not connected %} <h2><font color="#ef4444">●
      LifeDC disconnected</font></h2> {% else %} <h2><font color="#94a3b8"><b>○
      {{ status }}</b></font></h2> {% endif %}

      <b>Progress</b><br> <font size="4"><font color="#22c55e">{{ "#" * bars
      }}</font><font color="#334155">{{ "-" * (10 - bars) }}</font></font> <b>{{
      progress }}%</b><br>

      <b>Remaining</b> {{ min }}m {{ sec }}s<br> <hr> {% set z1 =
      states('sensor.irritrol_lifedc_zone_1_progress') | float(0) | round(0)
      | int %} {% set z2 = states('sensor.irritrol_lifedc_zone_2_progress')
      | float(0) | round(0) | int %} {% set z3 =
      states('sensor.irritrol_lifedc_zone_3_progress') | float(0) | round(0)
      | int %} {% set z4 = states('sensor.irritrol_lifedc_zone_4_progress')
      | float(0) | round(0) | int %}

      {% if is_state('switch.irritrol_lifedc_zone_1', 'on') %} <font
      color="#22c55e" size="4">● <b>Zone 1 RUNNING {{ z1 }}%</b></font><br> {%
      else %} <font color="#64748b">○ Zone 1 idle</font><br> {% endif %}

      {% if is_state('switch.irritrol_lifedc_zone_2', 'on') %} <font
      color="#22c55e" size="4">● <b>Zone 2 RUNNING {{ z2 }}%</b></font><br> {%
      else %} <font color="#64748b">○ Zone 2 idle</font><br> {% endif %}

      {% if is_state('switch.irritrol_lifedc_zone_3', 'on') %} <font
      color="#22c55e" size="4">● <b>Zone 3 RUNNING {{ z3 }}%</b></font><br> {%
      else %} <font color="#64748b">○ Zone 3 idle</font><br> {% endif %}

      {% if is_state('switch.irritrol_lifedc_zone_4', 'on') %} <font
      color="#22c55e" size="4">● <b>Zone 4 RUNNING {{ z4 }}%</b></font><br> {%
      else %} <font color="#64748b">○ Zone 4 idle</font><br> {% endif %}

      <hr>

      {% if connected %} <font color="#22c55e">● Connected</font> {% else %}
      <font color="#ef4444">● Disconnected</font> {% endif %}

      <br> {% set rssi = states('sensor.irritrol_lifedc_ble_rssi') |
      float(0) %}

      {% if rssi > -70 %} <font color="#22c55e">Signal: {{ rssi }} dBm
      (Good)</font> {% elif rssi > -85 %} <font color="#f59e0b">Signal: {{ rssi
      }} dBm (OK)</font> {% else %} <font color="#ef4444">Signal: {{ rssi }} dBm
      (Weak)</font> {% endif %}
  - type: custom:bubble-card
    card_type: button
    button_type: name
    entity: sensor.irritrol_lifedc_ble_rssi
    name: LifeDC BLE RSSI history
    icon: mdi:signal
    show_state: true
    tap_action:
      action: more-info
    styles: |
      .bubble-button-card-container {
        background: ${Number(hass.states['sensor.irritrol_lifedc_ble_rssi'].state) > -70
          ? 'rgba(34, 197, 94, 0.25)'
          : Number(hass.states['sensor.irritrol_lifedc_ble_rssi'].state) > -85
            ? 'rgba(245, 158, 11, 0.25)'
            : 'rgba(239, 68, 68, 0.25)'} !important;
      }

      .bubble-icon {
        color: ${Number(hass.states['sensor.irritrol_lifedc_ble_rssi'].state) > -70
          ? 'rgb(34, 197, 94)'
          : Number(hass.states['sensor.irritrol_lifedc_ble_rssi'].state) > -85
            ? 'rgb(245, 158, 11)'
            : 'rgb(239, 68, 68)'} !important;
      }



