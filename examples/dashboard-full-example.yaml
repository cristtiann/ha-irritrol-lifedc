type: custom:vertical-stack-in-card
cards:
  - type: markdown
    content: |
      ## Manual Control
  - type: horizontal-stack
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Start
        icon: mdi:play
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.irritrol_lifedc_start_cycle_1_2_3_4
        button_action:
          tap_action:
            action: perform-action
            perform_action: button.press
            target:
              entity_id: button.irritrol_lifedc_start_cycle_1_2_3_4
        sub_button:
          main:
            - entity: sensor.irritrol_lifedc_cycle_progress
              show_state: true
              show_icon: false
              show_name: false
              visibility:
                - condition: numeric_state
                  entity: sensor.irritrol_lifedc_cycle_progress
                  above: 0
                  below: 100
          bottom: []
        styles: |
          .bubble-button-card-container {
            background: ${Number(hass.states['sensor.irritrol_lifedc_cycle_progress'].state) > 0 &&
              Number(hass.states['sensor.irritrol_lifedc_cycle_progress'].state) < 100
              ? 'rgba(255, 193, 7, 0.35)'
              : ''} !important;
            border: ${Number(hass.states['sensor.irritrol_lifedc_cycle_progress'].state) > 0 &&
              Number(hass.states['sensor.irritrol_lifedc_cycle_progress'].state) < 100
              ? '1px solid rgba(255, 193, 7, 0.9)'
              : 'none'} !important;
          }
          .bubble-icon {
            color: ${Number(hass.states['sensor.irritrol_lifedc_cycle_progress'].state) > 0 &&
              Number(hass.states['sensor.irritrol_lifedc_cycle_progress'].state) < 100
              ? 'rgb(255, 193, 7)'
              : ''} !important;
          }
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Stop
        icon: mdi:stop
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.irritrol_lifedc_stop
        button_action:
          tap_action:
            action: perform-action
            perform_action: button.press
            target:
              entity_id: button.irritrol_lifedc_stop
        styles: |
          .bubble-button-card-container {
            background: ${hass.states['input_boolean.irritrol_stop_flash']?.state === 'on'
              ? 'rgba(244, 67, 54, 0.45)'
              : ''} !important;
            border: ${hass.states['input_boolean.irritrol_stop_flash']?.state === 'on'
              ? '1px solid rgba(244, 67, 54, 0.9)'
              : 'none'} !important;
          }
          .bubble-icon {
            color: ${hass.states['input_boolean.irritrol_stop_flash']?.state === 'on'
              ? 'rgb(244, 67, 54)'
              : ''} !important;
          }
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: name
        name: Next
        icon: mdi:skip-next
        tap_action:
