type: custom:vertical-stack-in-card
cards:
  - type: markdown
    content: >
      ## Weather Irrigation Forecast


      {% set rain = states('sensor.rain_next_12h') | float(0) %}

      {% set prob = states('sensor.rain_probability_next_12h') | int(0) %}

      {% set temp = states('sensor.temperature_avg_next_12h') |
      float(0) %}


      {% if rain > 1 %}

      🌧️ Rain expected: **{{ rain }} mm**

      {% else %}

      ☀️ Low rain expected

      {% endif %}


      🌦️ Rain probability: **{{ prob }}%**


      🌡️ Avg temperature: **{{ temp }}°C**


      {% if rain > 1 or prob > 60 %}

      🚫 Irrigation will probably be skipped

      {% else %}

      ✅ Irrigation conditions look OK

      {% endif %}
  - type: entities
    title: Irrigation Weather Sensors
    entities:
      - entity: sensor.rain_next_12h
        name: Rain Forecast
      - entity: sensor.rain_probability_next_12h
        name: Rain Probability
      - entity: sensor.temperature_avg_next_12h
        name: Avg Temperature

