#-->> AUTOMATIONS 

######### irrigation_schedule_all_zones
automation:
  - id: irrigation_schedule_all_zones
    alias: Irrigation Schedule All Zones
    mode: single

    triggers:
      - trigger: time
        at: input_datetime.irrigation_zone_1_morning_start
        id: z1_morning
      - trigger: time
        at: input_datetime.irrigation_zone_1_evening_start
        id: z1_evening
      - trigger: time
        at: input_datetime.irrigation_zone_2_morning_start
        id: z2_morning
      - trigger: time
        at: input_datetime.irrigation_zone_2_evening_start
        id: z2_evening
      - trigger: time
        at: input_datetime.irrigation_zone_3_morning_start
        id: z3_morning
      - trigger: time
        at: input_datetime.irrigation_zone_3_evening_start
        id: z3_evening
      - trigger: time
        at: input_datetime.irrigation_zone_4_morning_start
        id: z4_morning
      - trigger: time
        at: input_datetime.irrigation_zone_4_evening_start
        id: z4_evening

    conditions:
      - condition: state
        entity_id: input_boolean.irrigation_weather_skip
        state: "off"

    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: z1_morning
              - condition: state
                entity_id: input_boolean.irrigation_schedule_zone_1
                state: "on"
              - condition: state
                entity_id: input_boolean.irrigation_zone_1_morning_enabled
                state: "on"
              - condition: template
                value_template: >
                  {% set days = {1: 'monday', 2: 'tuesday', 3: 'wednesday', 4: 'thursday', 5: 'friday', 6: 'saturday', 7: 'sunday'} %}
                  {% set day = days[now().isoweekday()] %}
                  {{ is_state('input_boolean.irrigation_zone_1_' ~ day, 'on') }}
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.irritrol_lifedc_zone_1_minutes
                data:
                  value: >-
                    {% set runtime = states('input_number.irrigation_zone_1_morning_minutes') | float(0) %}
                    {% set percent = states('input_number.irrigation_vacation_runtime_percent') | float(100) %}
                    {% if is_state('input_boolean.irrigation_vacation_mode', 'on') %}
                      {{ (runtime * percent / 100) | round(0) }}
                    {% else %}
                      {{ runtime | round(0) }}
                    {% endif %}
              - action: number.set_value
                target:
                  entity_id: number.irritrol_lifedc_zone_1_seconds
                data:
                  value: "{{ states('input_number.irrigation_zone_1_morning_seconds') | int(0) }}"
              - delay: "00:00:03"
              - action: button.press
                target:
                  entity_id: button.irritrol_lifedc_run_zone_1
              - action: notify.mobile_app_sm_s938b
                data:
                  title: "🌱 Irrigation Morning"
                  message: >
                    Zone 1 started. Weather OK.
                    Runtime: {{ states('number.irritrol_lifedc_zone_1_minutes') }} min
                    {{ states('number.irritrol_lifedc_zone_1_seconds') }} sec.
                    {% if is_state('input_boolean.irrigation_vacation_mode', 'on') %}
                    Vacation mode active: runtime reduced to {{ states('input_number.irrigation_vacation_runtime_percent') }}%.
                    {% endif %}
          - conditions:
              - condition: trigger
                id: z1_evening
              - condition: state
                entity_id: input_boolean.irrigation_schedule_zone_1
                state: "on"
              - condition: state
                entity_id: input_boolean.irrigation_zone_1_evening_enabled
