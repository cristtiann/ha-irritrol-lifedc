    mode: single

    triggers:
      - trigger: time_pattern
        minutes: "/30"

      - trigger: homeassistant
        event: start

    actions:
      - choose:
          - conditions:
              - condition: or
                conditions:
                  - condition: numeric_state
                    entity_id: sensor.rain_next_12h
                    above: 1

                  - condition: numeric_state
                    entity_id: sensor.rain_probability_next_12h
                    above: 60

                  - condition: numeric_state
                    entity_id: sensor.temperature_avg_next_12h
                    below: 8
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.irrigation_weather_skip

        default:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.irrigation_weather_skip


#########- irrigation_cycle_finished                  

  - id: irrigation_finished_notification
    alias: Irrigation Finished Notification
    mode: single

    triggers:
      - trigger: state
        entity_id:
          - switch.irritrol_lifedc_zone_1
          - switch.irritrol_lifedc_zone_2
          - switch.irritrol_lifedc_zone_3
          - switch.irritrol_lifedc_zone_4
        from: "on"
        to: "off"

    conditions:
      - condition: template
        value_template: >
          {{
            is_state('switch.irritrol_lifedc_zone_1', 'off') and
            is_state('switch.irritrol_lifedc_zone_2', 'off') and
            is_state('switch.irritrol_lifedc_zone_3', 'off') and
            is_state('switch.irritrol_lifedc_zone_4', 'off')
          }}

    actions:
      - action: notify.mobile_app_sm_s938b
        data:
          title: "✅ Irrigation Finished"
          message: "All zones are now OFF."



